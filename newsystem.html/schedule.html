<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facilities Scheduling</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GENERAL */
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:#e5e7eb;
}

/* HEADER */
header{
background:#1e293b;
padding:20px;
border-bottom:2px solid #3b82f6;
}

header h1{
margin:0;
font-size:22px;
color:#60a5fa;
}

/* LAYOUT */
.container{
display:flex;
}

/* SIDEBAR */
aside{
width:230px;
background:#111827;
min-height:100vh;
padding:20px;
}

aside ul{
list-style:none;
padding:0;
}

aside li{
margin-bottom:12px;
}

aside a{
text-decoration:none;
color:#cbd5f5;
padding:10px;
display:block;
border-radius:6px;
}

aside a:hover{
background:#1f2937;
color:#60a5fa;
}

/* MAIN */
main{
flex:1;
padding:30px;
}

/* CARD */
.card{
background:#1e293b;
padding:25px;
border-radius:8px;
margin-bottom:25px;
}

/* TITLE */
.section-title{
color:#60a5fa;
margin-bottom:15px;
}

/* INPUT */
input, select{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #374151;
background:#020617;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* WARNING */
.warning{
color:#f87171;
font-size:14px;
margin-top:10px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #374151;
}

tr:hover{
background:#1f2937;
}

/* STATUS */
.status{
background:#16a34a;
padding:5px 10px;
border-radius:5px;
font-size:13px;
}

</style>

</head>

<body>

<header>
<h1>Faculty Scheduling</h1>
</header>

<div class="container">

<!-- Sidebar -->
<aside>
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="schedule.html">Facilities Scheduling</a></li>
<li><a href="attendance.html">Attendance</a></li>
<li><a href="reports.html">Reports</a></li>
<li><a href="attendance-grid.html">Faculty Schedule Grid</a></li>
<li><a href="logout.html">Logout</a></li>
</ul>
</aside>


<!-- Main Content -->
<main>

<!-- Schedule Form -->
<div class="card">

<h2 class="section-title">Create New Schedule</h2>

<form>

<select>
<option>IT Lab 1</option>
<option>IT Lab 2</option>
<option>Meeting Room</option>
</select>

<input type="date">

<input type="time">

<button>Schedule Facility</button>

</form>

<p class="warning">
⚠ Conflict Warning: This facility is already booked at selected time.
</p>

</div>


<!-- Upcoming Schedules -->
<div class="card">

<h2 class="section-title">Upcoming Schedules</h2>

<table>

<thead>
<tr>
<th>Facility</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>

<tbody>

<tr>
<td>IT Lab 1</td>
<td>2026-03-10</td>
<td>8:00 AM</td>

<td>
<span class="status">Approved</span>
</td>

</tr>

</tbody>

</table>

</div>

</main>
</div>

</body>
</html>
