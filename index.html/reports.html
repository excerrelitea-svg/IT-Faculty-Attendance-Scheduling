<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reports - IT Faculty System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GENERAL */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:#e5e7eb;
}

/* HEADER */
header{
    background:#1e293b;
    padding:20px;
    font-size:22px;
    font-weight:bold;
    border-bottom:2px solid #3b82f6;
}

/* LAYOUT */
.container{
    display:flex;
}

/* SIDEBAR */
aside{
    width:230px;
    background:#111827;
    min-height:100vh;
    padding:20px;
}

aside ul{
    list-style:none;
    padding:0;
}

aside li{
    margin-bottom:10px;
}

aside a{
    text-decoration:none;
    color:#cbd5f5;
    padding:10px;
    display:block;
    border-radius:6px;
}

aside a:hover{
    background:#1f2937;
    color:#60a5fa;
}

.active{
    background:#1f2937;
    color:#60a5fa;
}

/* MAIN */
main{
    flex:1;
    padding:30px;
}

/* FILTERS */
.filters{
    margin-bottom:25px;
}

input[type="month"]{
    padding:8px;
    border-radius:6px;
    border:none;
}

/* BUTTON */
button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

/* SUMMARY CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:8px;
}

.card h3{
    margin:0 0 10px 0;
}

/* TABLE */
.report-container{
    background:#1e293b;
    padding:20px;
    border-radius:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    padding:10px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #374151;
}

tr:hover{
    background:#1f2937;
}

/* BUTTON AREA */
.actions{
    margin-top:20px;
}

</style>
</head>

<body>

<header>
Reports & Analytics
</header>

<div class="container">

<!-- Sidebar -->
<aside>
<ul>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="schedule.html">Facilities Scheduling</a></li>
<li><a href="attendance.html">Attendance</a></li>
<li><a href="reports.html" class="active">Reports</a></li>
<li><a href="attendance-grid.html">Faculty Schedule Grid</a></li>
<li><a href="logout.html">Logout</a></li>
</ul>
</aside>

<!-- MAIN -->
<main>

<!-- FILTER -->
<div class="filters">

<input type="month">

<button>
Generate Report
</button>

</div>

<!-- SUMMARY -->
<div class="cards">

<div class="card">
<h3>Attendance Rate</h3>
<h2>92%</h2>
</div>

<div class="card">
<h3>Total Schedules</h3>
<h2>48</h2>
</div>

<div class="card">
<h3>Late Incidents</h3>
<h2>6</h2>
</div>

<div class="card">
<h3>Most Used Facility</h3>
<h2>IT Lab 1</h2>
</div>

</div>

<!-- REPORT TABLE -->
<div class="report-container">

<h3>Monthly Summary</h3>

<table>

<thead>
<tr>
<th>Faculty</th>
<th>Present</th>
<th>Late</th>
<th>Absent</th>
</tr>
</thead>

<tbody>

<tr>
<td>Dr. Maria Santos</td>
<td>20</td>
<td>1</td>
<td>0</td>
</tr>

</tbody>

</table>

<div class="actions">

<button>Export CSV</button>
<button>Print Report</button>

</div>

</div>

</main>

</div>

</body>
</html>
